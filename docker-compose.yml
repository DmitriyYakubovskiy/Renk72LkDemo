version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_renk72lk
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - renk72lk_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma_renk72lk
    environment:
      UPLOAD_LIMIT: 20M
      MAX_EXECUTION_TIME: 300
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "8080:80"
    networks:
      - renk72lk_network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  webapp:
    build:
      context: .
      dockerfile: Renk72Lk/dockerfile
    ports:
      - "85:85"
    environment:
      - ASPNETCORE_URLS=http://+:85
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    networks:
      - renk72lk_network
    depends_on:
      mysql:
        condition: service_healthy
      pdfgenerator:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  pdfgenerator:
    build:
      context: ./pdf-generator-api
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    networks:
      - renk72lk_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - webapp
      - rabbitmq
      - minio
    networks:
      - renk72lk_network
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  
      - "9001:9001"  
    environment:
      MINIO_ROOT_USER: MINIO_ROOT_USER
      MINIO_ROOT_PASSWORD: MINIO_ROOT_PASSWORD
    volumes:
      - minio_data:/data
    networks:
      - renk72lk_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "5672:5672" 
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - renk72lk_network
    restart: on-failure 

volumes:
  minio_data:
  rabbitmq_data:
  mysql_data:

networks:
  renk72lk_network:
    driver: bridge